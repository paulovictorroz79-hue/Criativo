<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dados Criativo</title>
    
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

<link
    rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>
<body class="container mt-4">

    <h1>Análise Alunos Colégio Criativo</h1>
    <img src="/static/Logocriativo.png" alt="balela" style="width: 20%;">
    <body>

<div class="container container-principal">

    <h1>📊 Análise de Dados dos Alunos</h1>

    <div class="card-custom">
        <form method="POST" enctype="multipart/form-data">

            <input
                type="file"
                name="arquivo"
                accept=".xlsx"
                class="form-control mb-3">

            <button
                type="submit"
                class="btn btn-primary">
                Analisar Arquivo
            </button>

            <a href="/" class="btn btn-danger">
                Limpar Dados
            </a>

        </form>
    </div>

    {% if tabela %}

        <hr>

        <h2>📋 Tabela Completa</h2>

         <div class="tabela-scroll">
        {{ tabela|safe }}
        </div>

        <h2>👥 Quantidade por Sexo</h2>

        <div class="card-custom">
        {{ tabela_sexo|safe }}
        </div>
       
        <h2>📈 Gráfico</h2>

        <div class="card-custom">
        <img
        src="{{ url_for('static', filename='grafico.png') }}"
        class="img-fluid">
        </div>

       <h2>🗺️ Mapa dos Alunos</h2>

        <div class="mapa">
        {{ mapa_html|safe }}
        </div>

    {% endif %}

</body>
</html>
